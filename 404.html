<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Seguimiento de envío | Items HN</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      padding: 22px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: radial-gradient(circle at top left, #ddecff, transparent 34rem), #f4f7fb;
    }
    .card {
      width: min(480px, 100%);
      padding: 30px;
      border: 1px solid #dfe6ef;
      border-radius: 25px;
      background: rgba(255,255,255,.96);
      box-shadow: 0 18px 55px rgba(20,39,73,.16);
      text-align: center;
    }
    .icon {
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      margin: 0 auto 17px;
      border-radius: 23px;
      color: white;
      font-size: 33px;
      background: linear-gradient(145deg, #2885ff, #0d50b7);
    }
    h1 { margin: 0 0 8px; font-size: 27px; }
    p { color: #667085; line-height: 1.55; }
    .guide {
      margin: 18px 0;
      padding: 13px;
      border-radius: 14px;
      background: #eef5ff;
      color: #0e4eaf;
      font-size: 21px;
      font-weight: 900;
      word-break: break-word;
    }
    .bar {
      height: 9px;
      overflow: hidden;
      border-radius: 99px;
      background: #dce8f8;
    }
    .bar span {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: #1769e0;
      animation: load 1.3s ease forwards;
    }
    @keyframes load { to { width: 100%; } }
    a {
      display: inline-flex;
      margin-top: 18px;
      padding: 11px 16px;
      border-radius: 13px;
      color: white;
      background: #1769e0;
      font-weight: 800;
      text-decoration: none;
    }
    .error { color: #bd2525; }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">📦</div>
    <h1>Items HN</h1>
    <p id="message">Preparando el seguimiento oficial de tu envío.</p>
    <div id="guideBox" class="guide">Cargando…</div>
    <div id="progress" class="bar"><span></span></div>
    <a id="manualLink" href="#">Abrir seguimiento ahora</a>
  </main>

  <script>
    'use strict';

    const AID = 'c586fa65-473e-454d-826b-448cea88b320';
    const params = new URLSearchParams(window.location.search);
    const guide = String(params.get('guia') || params.get('ordno') || '')
      .trim()
      .toUpperCase()
      .replace(/\s+/g, '')
      .replace(/[^A-Z0-9-]/g, '')
      .slice(0, 60);

    const guideBox = document.getElementById('guideBox');
    const message = document.getElementById('message');
    const progress = document.getElementById('progress');
    const manualLink = document.getElementById('manualLink');

    if (!guide) {
      guideBox.textContent = 'Número no encontrado';
      guideBox.classList.add('error');
      message.textContent = 'El enlace no contiene un número de guía válido.';
      progress.hidden = true;
      manualLink.hidden = true;
    } else {
      const target = `https://api.loginextsolutions.com/trackall/#/order?ordno=${encodeURIComponent(guide)}&aid=${encodeURIComponent(AID)}`;
      guideBox.textContent = guide;
      manualLink.href = target;
      setTimeout(() => window.location.replace(target), 1200);
    }
  </script>
</body>
</html>
